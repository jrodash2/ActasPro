{% extends 'almacen/base.html' %}
{% load static %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="page-body">
  <div class="container-fluid">
    <div class="page-title">
      <div class="row">
        <div class="col-6">
          <h2>Dashboard</h2>
        </div>
        <div class="col-6">
          <ol class="breadcrumb">
            <li class="breadcrumb-item">
              <a href="#">
                <svg class="stroke-icon">
                  <use href="../assets/svg/icon-sprite.svg#stroke-home"></use>
                </svg>
              </a>
            </li>
          </ol>
        </div>
      </div>
    </div>
  </div>

  <div class="container-fluid">
    <div class="row">
      <div class="col-xl-4 col-md-6">
        <div class="card">
          <div class="card-body">
            <h5>Módulo de Actas Consistoriales</h5>
            <p class="mb-3">Accede al flujo completo de sesiones, acuerdos y actas.</p>
            <a class="btn btn-primary" href="{% url 'actas_app:dashboard' %}">Ir al módulo</a>
          </div>
        </div>
      </div>
    </div>
  </div>


  
  
{% endblock %}
